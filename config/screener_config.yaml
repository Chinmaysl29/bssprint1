
# NIFTY100 Stock Screener Configuration

screens:
  quality_compounder:
    name: "Quality Compounder"
    filters:
      roe_min: 18
      debt_equity_max: 1.5
      fcf_min: -50000

  value_pick:
    name: "Value Pick"
    filters:
      debt_equity_max: 2
      fcf_min: -50000
      roce_min: 15

  growth_accelerator:
    name: "Growth Accelerator"
    filters:
      roe_min: 15
      debt_equity_max: 2
      opm_min: 15

  dividend_champion:
    name: "Dividend Champion"
    filters:
      dividend_payout_max: 90
      fcf_min: 0
      roe_min: 12

  debt_free_bluechip:
    name: "Debt-Free Bluechip"
    filters:
      debt_equity_max: 0
      roe_min: 10
      revenue_min: 5000

  turnaround_watch:
    name: "Turnaround Watch"
    filters:
      fcf_min: 1000
      debt_equity_max: 1.5
      roe_min: 10

database:
  path: "db/nifty100.db"
