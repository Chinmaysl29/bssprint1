
# NIFTY100 Stock Screener Configuration

screens:
  quality_compounder:
    name: "Quality Compounder"
    filters:
      roe_min: 15
      debt_equity_max: 1
      fcf_min: 0
      revenue_cagr_5yr_min: 10

  value_pick:
    name: "Value Pick"
    filters:
      pe_max: 20
      pb_max: 3
      debt_equity_max: 2
      dividend_yield_min: 1

  growth_accelerator:
    name: "Growth Accelerator"
    filters:
      pat_cagr_5yr_min: 20
      revenue_cagr_5yr_min: 15
      debt_equity_max: 2

  dividend_champion:
    name: "Dividend Champion"
    filters:
      dividend_yield_min: 2
      dividend_payout_max: 80
      fcf_min: 0

  debt_free_bluechip:
    name: "Debt-Free Bluechip"
    filters:
      debt_equity_max: 0
      roe_min: 12
      revenue_min: 5000

  turnaround_watch:
    name: "Turnaround Watch"
    filters:
      revenue_cagr_3yr_min: 10
      fcf_positive: true
      debt_declining: true

database:
  path: "db/nifty100.db"
